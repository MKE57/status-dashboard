name: Update Adyen and ATG Tickets Status Cache
run-name: Adyen and ATG cache update via ${{ github.event_name }}

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  schedule:
    # Runs every 15 minutes. Times are UTC and may be delayed by GitHub Actions load.
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: update-adyen-atg-status-cache
  cancel-in-progress: false

jobs:
  update-statuspage-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Fetch Adyen and ATG Tickets status
        run: node scripts/fetch-statuspage-cache.js

      - name: Commit updated status caches
        run: |
          if git diff --quiet -- data/adyen.json data/atg-tickets.json; then
            echo "No Adyen or ATG Tickets cache changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/adyen.json data/atg-tickets.json
          git commit -m "Update Adyen and ATG Tickets status cache"
          git push
