name: Update Adyen Status Cache
run-name: Adyen cache update via ${{ github.event_name }}

on:
  workflow_dispatch: {}
  schedule:
    # Runs every 15 minutes. Times are UTC and may be delayed by GitHub Actions load.
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: update-adyen-status-cache
  cancel-in-progress: false

jobs:
  update-adyen-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Fetch Adyen current status and incident history
        run: node scripts/fetch-statuspage-cache.js

      - name: Commit updated Adyen cache
        run: |
          if git diff --quiet -- data/adyen.json; then
            echo "No Adyen cache changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/adyen.json
          git commit -m "Update Adyen status cache"
          git push
