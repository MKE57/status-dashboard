name: Update IBM Planning Analytics Status Cache

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions scheduled workflows have a practical minimum interval of 5 minutes.
    # Times are UTC and may be delayed slightly by GitHub Actions load.
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-ibm-planning-analytics-status-cache
  cancel-in-progress: false

jobs:
  update-ibm-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch IBM Planning Analytics status
        run: node wallboardtest/scripts/fetch-ibm-planning-analytics.js

      - name: Commit updated IBM cache
        run: |
          if git diff --quiet -- data/ibm-planning-analytics.json; then
            echo "No IBM cache changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ibm-planning-analytics.json
          git commit -m "Update IBM Planning Analytics status cache"
          git push
