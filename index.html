<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SaaS Status Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1b33;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1f2f46;
      border-radius: 12px;
      padding: 20px;
      border-left: 6px solid green;
    }

    .card.minor { border-color: orange; }
    .card.major { border-color: red; }

    .status {
      font-weight: bold;
      margin: 10px 0;
    }

    .incidents {
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>SaaS Status Dashboard</h1>

<div id="grid" class="grid"></div>

<script>
const providers = [
  {
    name: "Cloudflare",
    type: "statuspage",
    url: "https://www.cloudflarestatus.com/api/v2/summary.json"
  },
  {
    name: "Worldpay",
    type: "statuspage",
    url: "https://status.worldpay.com/api/v2/summary.json"
  },
  {
    name: "AudienceView Professional",
    type: "statuspage",
    url: "https://professional-status.audienceview.com/api/v2/summary.json"
  },
  {
    name: "AudienceView Unlimited",
    type: "statuspage",
    url: "https://unlimited-status.audienceview.com/api/v2/summary.json"
  },
  {
    name: "IBM Planning Analytics",
    type: "cached-json",
    url: "data/ibm-planning-analytics.json"
  },
  {
    name: "IBM Controller",
    type: "cached-json",
    url: "data/ibm-controller.json"
  },
  {
    name: "Adyen",
    type: "cached-json",
    url: "data/adyen.json"
  }
];

async function fetchStatus(provider) {
  try {
    if (provider.type === "statuspage") {
      const res = await fetch(provider.url);
      const data = await res.json();

      const incidents = data.incidents || [];
      const unresolved = incidents.filter(i => i.status !== "resolved");

      return {
        name: provider.name,
        status: unresolved.length > 0 ? "Minor Incident" : "Operational",
        incidents: unresolved.slice(0, 3)
      };
    }

    if (provider.type === "cached-json") {
      const res = await fetch(provider.url);
      const data = await res.json();

      return {
        name: provider.name,
        status: data.status || "Operational",
        incidents: (data.recentIncidents || []).slice(0, 3)
      };
    }

  } catch (e) {
    return {
      name: provider.name,
      status: "Unavailable",
      incidents: []
    };
  }
}

function renderCard(data) {
  const card = document.createElement("div");
  card.className = "card";

  if (data.status === "Minor Incident") card.classList.add("minor");
  if (data.status === "Major Incident") card.classList.add("major");

  const incidentsHtml = data.incidents.map(i =>
    `<div>- ${i.name || "Incident"}</div>`
  ).join("");

  card.innerHTML = `
    <h2>${data.name}</h2>
    <div class="status">${data.status}</div>
    <div class="incidents">
      ${incidentsHtml || "No recent incidents"}
    </div>
  `;

  return card;
}

async function init() {
  const grid = document.getElementById("grid");

  for (const provider of providers) {
    const data = await fetchStatus(provider);
    const card = renderCard(data);
    grid.appendChild(card);
  }
}

init();
</script>

</body>
</html>
``
