<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Status Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: #f8fafc;
  color: #1f2937;
}

body.dark-mode {
  background: #0f172a;
  color: #e5e7eb;
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
}

.header-time {
  text-align: right;
  font-size: 14px;
  color: #1f2937;
  white-space: nowrap;
  margin-top: 2px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 10px 12px;
  min-width: 210px;
  box-sizing: border-box;
}

body.dark-mode .header-time {
  background: #1e293b;
  color: #e5e7eb;
  border-color: #334155;
}

h1 {
  margin-bottom: 5px;
}

button {
  padding: 8px 12px;
  margin-right: 10px;
  cursor: pointer;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background: white;
  color: #1f2937;
}

body.dark-mode button {
  background: #1e293b;
  color: #e5e7eb;
  border-color: #475569;
}

.controls {
  margin-top: 12px;
  margin-bottom: 10px;
}

.summary-banner {
  margin-top: 15px;
  margin-bottom: 10px;
  padding: 12px 15px;
  border-radius: 10px;
  font-weight: bold;
  border: 1px solid #e5e7eb;
}

.summary-good {
  background: #dcfce7;
  color: #065f46;
  border-color: #bbf7d0;
}

.summary-warn {
  background: #fef3c7;
  color: #92400e;
  border-color: #fde68a;
}

.summary-bad {
  background: #fee2e2;
  color: #991b1b;
  border-color: #fecaca;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 15px;
}

.summary-card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px;
}

body.dark-mode .summary-card {
  background: #1e293b;
  border-color: #334155;
}

.summary-label {
  font-size: 12px;
  color: #6b7280;
}

body.dark-mode .summary-label {
  color: #cbd5e1;
}

.summary-value {
  font-size: 24px;
  font-weight: bold;
  margin-top: 4px;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 15px;
  margin-top: 15px;
}

.card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 15px;
  min-height: 160px;
  box-sizing: border-box;
}

body.dark-mode .card {
  background: #1e293b;
  border-color: #334155;
}

.badge {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  display: inline-block;
}

.good {
  background: #dcfce7;
  color: #065f46;
}

.warn {
  background: #fef3c7;
  color: #92400e;
}

.bad {
  background: #fee2e2;
  color: #991b1b;
}

.small {
  font-size: 12px;
  color: #6b7280;
}

body.dark-mode .small {
  color: #cbd5e1;
}

ul {
  margin-top: 8px;
  padding-left: 20px;
}

@media (max-width: 800px) {
  .header-row {
    flex-direction: column;
  }

  .header-time {
    text-align: left;
  }

  .summary-grid {
    grid-template-columns: 1fr;
  }

  .dashboard-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="header-row">
  <div>
    <h1>SaaS Status Dashboard</h1>
    <p class="small">Simple aggregated view of Cloudflare, Worldpay and AudienceView status pages</p>
  </div>

  <div id="currentTime" class="header-time"></div>
</div>

<div id="summaryBanner" class="summary-banner summary-good">
  Loading service status...
</div>

<div class="summary-grid">
  <div class="summary-card">
    <div class="summary-label">Services monitored</div>
    <div id="servicesMonitored" class="summary-value">0</div>
  </div>

  <div class="summary-card">
    <div class="summary-label">Services with issues</div>
    <div id="servicesWithIssues" class="summary-value">0</div>
  </div>

  <div class="summary-card">
    <div class="summary-label">Active incidents</div>
    <div id="activeIncidents" class="summary-value">0</div>
  </div>
</div>

<div class="controls">
  <button onclick="loadStatuses()">Refresh</button>
  <button onclick="toggleDarkMode()" id="darkModeButton">Dark Mode</button>
  <span id="lastRefresh" class="small"></span>
</div>

<div id="results" class="dashboard-grid"></div>

<script>
const providers = [
  {
    name: "Cloudflare",
    url: "https://www.cloudflarestatus.com/api/v2/summary.json"
  },
  {
    name: "Worldpay",
    url: "https://status.worldpay.com/api/v2/summary.json"
  },
  {
    name: "AudienceView Professional",
    url: "https://professional-status.audienceview.com/api/v2/summary.json"
  },
  {
    name: "AudienceView Unlimited",
    url: "https://unlimited-status.audienceview.com/api/v2/summary.json"
  }
];

function toggleDarkMode() {
  document.body.classList.toggle("dark-mode");

  const isDarkMode = document.body.classList.contains("dark-mode");
  localStorage.setItem("darkMode", isDarkMode ? "enabled" : "disabled");

  document.getElementById("darkModeButton").innerText = isDarkMode ? "Light Mode" : "Dark Mode";
}

function applySavedTheme() {
  const savedTheme = localStorage.getItem("darkMode");

  if (savedTheme === "enabled") {
    document.body.classList.add("dark-mode");
    document.getElementById("darkModeButton").innerText = "Light Mode";
  }
}

function updateCurrentTime() {
  document.getElementById("currentTime").innerText = "Current time: " + new Date().toLocaleString();
}

function getStatusClass(status) {
  if (!status) return "warn";

  status = status.toLowerCase();

  if (status.includes("operational") || status.includes("all systems")) {
    return "good";
  }

  if (status.includes("degraded") || status.includes("minor") || status.includes("maintenance")) {
    return "warn";
  }

  return "bad";
}

function getSeverity(service) {
  const status = service.status.toLowerCase();

  if (service.status === "Unable to fetch") {
    return 3;
  }

  if (
    status.includes("critical") ||
    status.includes("major") ||
    status.includes("partial outage")
  ) {
    return 3;
  }

  if (
    status.includes("minor") ||
    status.includes("degraded") ||
    status.includes("maintenance") ||
    status.includes("service outage")
  ) {
    return 2;
  }

  if (service.incidents.length > 0) {
    return 2;
  }

  return 1;
}

function hasIssue(service) {
  return getSeverity(service) > 1;
}

function updateSummary(results) {
  const servicesMonitored = results.length;
  const servicesWithIssues = results.filter(hasIssue).length;
  const activeIncidents = results.reduce((total, service) => total + service.incidents.length, 0);
  const highestSeverity = Math.max(...results.map(getSeverity));

  document.getElementById("servicesMonitored").innerText = servicesMonitored;
  document.getElementById("servicesWithIssues").innerText = servicesWithIssues;
  document.getElementById("activeIncidents").innerText = activeIncidents;

  const banner = document.getElementById("summaryBanner");

  banner.classList.remove("summary-good", "summary-warn", "summary-bad");

  if (highestSeverity === 1) {
    banner.classList.add("summary-good");
    banner.innerText = "All monitored services are currently operational";
  } else if (highestSeverity === 2) {
    banner.classList.add("summary-warn");
    banner.innerText = "One or more monitored services are reporting a minor issue, degraded performance or maintenance";
  } else {
    banner.classList.add("summary-bad");
    banner.innerText = "One or more monitored services are reporting a major issue or could not be checked";
  }
}

async function fetchProvider(provider) {
  try {
    const res = await fetch(provider.url);
    const data = await res.json();

    return {
      name: provider.name,
      status: data.status.description,
      incidents: data.incidents || [],
      updated: data.page.updated_at
    };
  } catch (err) {
    return {
      name: provider.name,
      status: "Unable to fetch",
      incidents: [],
      updated: null
    };
  }
}

async function loadStatuses() {
  const container = document.getElementById("results");
  container.innerHTML = "<div class='card'>Loading...</div>";

  const results = await Promise.all(providers.map(fetchProvider));

  updateSummary(results);

  container.innerHTML = "";

  results.forEach(service => {
    const card = document.createElement("div");
    card.className = "card";

    const badgeClass = getStatusClass(service.status);

    let incidentHtml = "";

    if (service.incidents.length > 0) {
      incidentHtml = "<ul>" + service.incidents.map(incident => {
        return "<li>" + incident.name + " - " + incident.status + "</li>";
      }).join("") + "</ul>";
    }

    card.innerHTML = `
      <h2>${service.name}</h2>
      <div class="badge ${badgeClass}">${service.status}</div>
      <p class="small">Updated: ${service.updated || "Unknown"}</p>
      <p><strong>Active Incidents:</strong> ${service.incidents.length}</p>
      ${incidentHtml}
    `;

    container.appendChild(card);
  });

  document.getElementById("lastRefresh").innerText = "Last refreshed: " + new Date().toLocaleString();
}

applySavedTheme();
updateCurrentTime();
loadStatuses();

setInterval(updateCurrentTime, 1000);
setInterval(loadStatuses, 60000);
</script>

</body>
</html>
