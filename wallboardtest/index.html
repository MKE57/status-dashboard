async function fetchProvider(p){try{const[sum,inc]=await Promise.all([fetch(p.url),fetch(p.incidentsUrl)]),sd=await sum.json(),id=await inc.json(),raw=sd.incidents||[],sched=sd.scheduled_maintenances||[],notices=raw.filter(isMaintenanceNotice);return{name:p.name,statusPage:p.statusPage,logoText:p.logoText,logoSrc:p.logoSrc,status:sd.status.description,activeIncidents:raw.filter(i=>!isMaintenanceNotice(i)),activeMaintenances:sched.filter(isMaintenanceActive),upcomingMaintenances:sched.filter(isMaintenanceUpcomingWithin24Hours).concat(notices.filter(isUpcomingMaintenanceNotice).filter(isMaintenanceUpcomingWithin24Hours)),recentIncidents:id.incidents||[],updated:sd.page.updated_at}}catch(e){return{name:p.name,statusPage:p.statusPage,logoText:p.logoText,logoSrc:p.logoSrc,status:"Unable to fetch",activeIncidents:[],activeMaintenances:[],upcomingMaintenances:[],recentIncidents:[],updated:null}}}
function formatDateTime(v){if(!v)return"Unknown";try{return new Date(v).toLocaleString([],{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})}catch(e){return v}}function formatUpdatedTime(v){if(!v)return"Unknown";try{return new Date(v).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}catch(e){return v}}function formatMaintenanceTime(m){const d=getMaintenanceDate(m);return d?formatDateTime(d):"See provider status page"}function timeAgo(v){if(!v)return"Unknown";const d=new Date(v);if(Number.isNaN(d.getTime()))return"Unknown";const mins=Math.max(0,Math.floor((new Date()-d)/60000)),hrs=Math.floor(mins/60),days=Math.floor(hrs/24);if(days>0)return days+"d "+(hrs%24)+"h ago";if(hrs>0)return hrs+"h "+(mins%60)+"m ago";if(mins>0)return mins+"m ago";return"just now"}function incidentPillClass(i){return isMaintenanceNotice(i)?"maintenance":isMajorIncident(i)?"bad":"warn"}function sortIncidentsNewestFirst(a){return[...a].sort((x,y)=>new Date(y.updated_at||y.resolved_at||y.created_at||0)-new Date(x.updated_at||x.resolved_at||x.created_at||0))}function logoHtml(s){return`<a class="service-logo-link" href="${s.statusPage}" target="_blank" rel="noopener noreferrer" aria-label="Open ${s.name} status page"><div class="service-logo"><img src="${s.logoSrc}" alt="${s.name} logo" onerror="this.style.display='none';this.parentElement.textContent='${s.logoText}';"></div></a>`}function maintenanceSummaryHtml(s){const a=s.activeMaintenances[0],u=s.upcomingMaintenances[0];if(a)return`<div class="card-detail maintenance-line"><strong>Maintenance:</strong> in progress</div>`;if(u)return`<div class="card-detail maintenance-line"><strong>Upcoming maintenance:</strong> ${formatMaintenanceTime(u)}</div>`;return""}function buildIncidentDetails(s){const sorted=sortIncidentsNewestFirst(s.recentIncidents),latest=sorted[0],resolved=sortIncidentsNewestFirst(s.recentIncidents.filter(i=>i.status==="resolved"&&!isMaintenanceNotice(i))).slice(0,3);let m="";if(s.activeMaintenances.length>0)m=`<div class="detail-block"><p class="detail-heading">Maintenance in progress</p><ul class="detail-list">${s.activeMaintenances.slice(0,2).map(x=>`<li><span class="detail-pill maintenance">Maintenance</span>${x.name} - ${formatMaintenanceTime(x)}</li>`).join("")}</ul></div>`;else if(s.upcomingMaintenances.length>0)m=`<div class="detail-block"><p class="detail-heading">Upcoming maintenance within 24 hours</p><ul class="detail-list">${s.upcomingMaintenances.slice(0,2).map(x=>`<li><span class="detail-pill maintenance">Scheduled</span>${x.name} - ${formatMaintenanceTime(x)}</li>`).join("")}</ul></div>`;let active="";if(s.activeIncidents.length>0)active=`<div class="detail-block"><p class="detail-heading">Active incident details</p><ul class="detail-list">${s.activeIncidents.slice(0,2).map(i=>"<li><span class='detail-pill "+incidentPillClass(i)+"'>"+(isMajorIncident(i)?"Major":"Active")+"</span>"+i.name+" - updated "+formatDateTime(i.updated_at||i.created_at)+"</li>").join("")}</ul></div>`;let hist="";if(resolved.length>0)hist=`<div class="detail-block"><p class="detail-heading">Last 3 resolved incidents</p><ul class="detail-list">${resolved.map(i=>{const d=i.updated_at||i.resolved_at||i.created_at;return"<li>"+i.name+" - "+formatDateTime(d)+" ("+timeAgo(d)+")</li>"}).join("")}</ul></div>`;else if(latest&&!isMaintenanceNotice(latest))hist=`<div class="detail-block"><p class="detail-heading">Latest provider update</p><ul class="detail-list"><li><span class="detail-pill ${incidentPillClass(latest)}">${latest.status||"Update"}</span>${latest.name} - updated ${formatDateTime(latest.updated_at||latest.created_at)} (${timeAgo(latest.updated_at||latest.created_at)})</li></ul></div>`;else hist=`<div class="detail-block"><p class="detail-heading">Incident history</p><p class="small">No recent non-maintenance incident history reported by this provider.</p></div>`;return m+active+hist}
function clampNumber(v,min,max){return Math.max(min,Math.min(max,v))}function setCardSizing(c,scale){const h=c.clientHeight||220;c.style.setProperty("--title-size",clampNumber(h*.16*scale,22,56)+"px");c.style.setProperty("--badge-size",clampNumber(h*.105*scale,15,36)+"px");c.style.setProperty("--badge-py",clampNumber(h*.035*scale,5,14)+"px");c.style.setProperty("--badge-px",clampNumber(h*.07*scale,10,28)+"px");c.style.setProperty("--detail-size",clampNumber(h*.09*scale,14,32)+"px");c.style.setProperty("--card-gap",clampNumber(h*.04*scale,5,18)+"px");c.style.setProperty("--logo-w",clampNumber(h*.42*scale,64,165)+"px");c.style.setProperty("--logo-h",clampNumber(h*.26*scale,42,100)+"px")}function clearDesktopCardSizing(c){["--title-size","--badge-size","--badge-py","--badge-px","--detail-size","--card-gap","--logo-w","--logo-h"].forEach(p=>c.style.removeProperty(p))}function fitDesktopCards(){const cards=Array.from(document.querySelectorAll(".card"));if(window.innerWidth<=1000){cards.forEach(clearDesktopCardSizing);return}let globalScale=1;for(let attempt=0;attempt<10;attempt++){cards.forEach(c=>setCardSizing(c,globalScale));let nextScale=globalScale;cards.forEach(c=>{const content=c.querySelector(".card-fit");if(!content)return;const st=getComputedStyle(c),pad=parseFloat(st.paddingTop)+parseFloat(st.paddingBottom),available=c.clientHeight-pad,required=content.scrollHeight;if(available&&required&&required>available-2)nextScale=Math.min(nextScale,globalScale*((available-2)/required))});nextScale=clampNumber(nextScale,.55,1);if(Math.abs(nextScale-globalScale)<.005)break;globalScale=nextScale}cards.forEach(c=>setCardSizing(c,globalScale))}function scheduleDesktopCardFit(){clearTimeout(cardFitResizeTimer);cardFitResizeTimer=setTimeout(fitDesktopCards,60)}
function setRefreshing(on){document.getElementById("results").classList.toggle("refreshing",on);document.getElementById("summaryGrid").classList.toggle("refreshing",on);document.getElementById("summaryBanner").classList.toggle("refreshing",on)}async function loadStatuses(){if(isLoadingStatuses||anyCardExpanded()){updateAutoRefreshState();return}isLoadingStatuses=true;const container=document.getElementById("results"),firstLoad=!container.children.length;if(firstLoad)container.innerHTML="<div class='card'><div class='card-fit'>Loading...</div></div>";else setRefreshing(true);const results=await Promise.all(providers.map(fetchProvider));if(!firstLoad)await new Promise(r=>setTimeout(r,180));updateSummary(results);container.innerHTML="";results.forEach(s=>{const card=document.createElement("div"),badge=getStatusClass(s),display=getDisplayStatus(s),details=buildIncidentDetails(s);card.className="card "+getCardBorderClass(s);card.innerHTML=`<div class="card-fit"><div class="service-header"><h2><a class="provider-link" href="${s.statusPage}" target="_blank" rel="noopener noreferrer">${s.name}</a></h2></div>${logoHtml(s)}<div class="badge ${badge}">${display}</div><div class="card-detail"><strong>Active incidents:</strong> ${s.activeIncidents.length}</div>${maintenanceSummaryHtml(s)}<div class="card-detail provider-updated-line"><strong>Provider updated:</strong> ${formatUpdatedTime(s.updated)} (${timeAgo(s.updated)})</div><div class="mobile-details"><div class="mobile-details-inner">${details}</div></div><button class="mobile-card-toggle" type="button" aria-label="Expand ${s.name} details" aria-expanded="false" title="Expand details" onclick="toggleMobileCardDetails(this)"></button></div>`;container.appendChild(card)});document.getElementById("lastRefreshFooter").innerText="Last refreshed: "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});document.getElementById("dashboardMeta").innerText="Version: "+dashboardVersion+" | Built and maintained by "+dashboardMaintainer;isLoadingStatuses=false;updateAutoRefreshState();fitDesktopCards();requestAnimationFrame(()=>setRefreshing(false))}
applySavedTheme();updateCurrentTime();loadStatuses();startAutoRefresh();document.addEventListener("dblclick",handleBackgroundDoubleClick);window.addEventListener("resize",scheduleDesktopCardFit);window.addEventListener("orientationchange",scheduleDesktopCardFit);setInterval(updateCurrentTime,1000);
</script></body></html>
