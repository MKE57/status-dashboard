<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Status Dashboard</title>

<style>
:root {
  --light-bg: #f8fafc;
  --light-text: #1f2937;
  --light-panel: #ffffff;
  --light-border: #e5e7eb;
  --light-muted: #6b7280;

  --dark-bg: #0f172a;
  --dark-text: #e5e7eb;
  --dark-panel: #1e293b;
  --dark-border: #334155;
  --dark-muted: #cbd5e1;

  --green-bg: #dcfce7;
  --green-text: #065f46;
  --green-border: #22c55e;

  --yellow-bg: #fef3c7;
  --yellow-text: #92400e;
  --yellow-border: #f59e0b;

  --red-bg: #fee2e2;
  --red-text: #991b1b;
  --red-border: #ef4444;

  --wall-green-bg: #14532d;
  --wall-yellow-bg: #713f12;
  --wall-red-bg: #7f1d1d;
}

* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 20px;
  background: var(--light-bg);
  color: var(--light-text);
}

body.dark-mode,
body.wallboard-mode {
  background: var(--dark-bg);
  color: var(--dark-text);
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
}

.header-time {
  text-align: right;
  font-size: 14px;
  color: var(--light-text);
  white-space: nowrap;
  margin-top: 2px;
  background: var(--light-panel);
  border: 1px solid var(--light-border);
  border-radius: 10px;
  padding: 10px 12px;
  min-width: 210px;
}

body.dark-mode .header-time,
body.wallboard-mode .header-time {
  background: var(--dark-panel);
  color: var(--dark-text);
  border-color: var(--dark-border);
}

h1 { margin-bottom: 5px; }

.test-label {
  display: none;
  margin-bottom: 8px;
  padding: 6px 10px;
  background: var(--yellow-bg);
  color: var(--yellow-text);
  border: 1px solid var(--yellow-border);
  border-radius: 8px;
  font-weight: bold;
  width: fit-content;
}

body.test-mode .test-label { display: inline-block; }

button {
  padding: 8px 12px;
  margin-right: 10px;
  cursor: pointer;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background: white;
  color: var(--light-text);
}

body.dark-mode button {
  background: var(--dark-panel);
  color: var(--dark-text);
  border-color: #475569;
}

.controls {
  margin-top: 12px;
  margin-bottom: 10px;
}

.summary-banner {
  margin-top: 15px;
  margin-bottom: 10px;
  padding: 12px 15px;
  border-radius: 10px;
  font-weight: bold;
  border: 1px solid var(--light-border);
}

.summary-good {
  background: var(--green-bg);
  color: var(--green-text);
  border-color: #bbf7d0;
}

.summary-warn {
  background: var(--yellow-bg);
  color: var(--yellow-text);
  border-color: #fde68a;
}

.summary-bad {
  background: var(--red-bg);
  color: var(--red-text);
  border-color: #fecaca;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 15px;
}

.summary-card {
  background: var(--light-panel);
  border: 1px solid var(--light-border);
  border-radius: 10px;
  padding: 12px;
}

body.dark-mode .summary-card,
body.wallboard-mode .summary-card {
  background: var(--dark-panel);
  border-color: var(--dark-border);
}

.summary-label {
  font-size: 12px;
  color: var(--light-muted);
}

body.dark-mode .summary-label,
body.wallboard-mode .summary-label { color: var(--dark-muted); }

.summary-value {
  font-size: 24px;
  font-weight: bold;
  margin-top: 4px;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 15px;
  margin-top: 15px;
}

.card {
  background: var(--light-panel);
  border: 1px solid var(--light-border);
  border-radius: 10px;
  padding: 15px;
  min-height: 160px;
}

body.dark-mode .card,
body.wallboard-mode .card {
  background: var(--dark-panel);
  border-color: var(--dark-border);
}

.provider-link {
  color: inherit;
  text-decoration: none;
}

.provider-link:hover { text-decoration: underline; }
body.wallboard-mode .provider-link:hover { text-decoration: none; }

.badge {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  display: inline-block;
}

.good { background: var(--green-bg); color: var(--green-text); }
.warn { background: var(--yellow-bg); color: var(--yellow-text); }
.bad { background: var(--red-bg); color: var(--red-text); }

.small {
  font-size: 12px;
  color: var(--light-muted);
}

body.dark-mode .small,
body.wallboard-mode .small { color: var(--dark-muted); }

ul {
  margin-top: 8px;
  padding-left: 20px;
}

.footer-row { display: none; }

/* Wallboard mode */

body.wallboard-mode {
  margin: 0;
  padding: clamp(10px, min(2vw, 2vh), 28px);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

body.wallboard-mode .header-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: clamp(10px, min(2vw, 2vh), 28px);
  align-items: start;
  margin-bottom: clamp(8px, min(1.5vw, 1.6vh), 18px);
  flex-shrink: 0;
}

body.wallboard-mode h1 {
  margin: 0;
  font-size: clamp(28px, min(3.2vw, 6vh), 64px);
  line-height: 1.05;
  letter-spacing: -1px;
}

body.wallboard-mode .small {
  margin-top: clamp(3px, min(0.6vw, 0.8vh), 8px);
  font-size: clamp(12px, min(1.1vw, 2.2vh), 24px);
}

body.wallboard-mode .test-label { display: none; }

body.wallboard-mode .header-time {
  min-width: clamp(260px, 26vw, 380px);
  border-radius: 22px;
  padding: clamp(10px, min(1.6vw, 2vh), 20px) clamp(14px, min(1.8vw, 2.4vh), 24px);
  text-align: right;
  border-width: 2px;
}

body.wallboard-mode .time-label {
  font-size: clamp(12px, min(1vw, 2vh), 22px);
  color: var(--dark-muted);
  margin-bottom: clamp(3px, min(0.5vw, 0.7vh), 6px);
}

body.wallboard-mode .time-value {
  font-size: clamp(28px, min(3vw, 6vh), 68px);
  font-weight: bold;
  line-height: 1;
}

body.wallboard-mode .date-value {
  margin-top: clamp(4px, min(0.7vw, 0.9vh), 8px);
  font-size: clamp(12px, min(1.1vw, 2.2vh), 24px);
  color: var(--dark-muted);
}

body.wallboard-mode .summary-banner {
  border-radius: clamp(14px, min(1.8vw, 2vh), 24px);
  padding: clamp(12px, min(2vw, 2.8vh), 28px) clamp(16px, min(2.3vw, 3vh), 32px);
  font-size: clamp(22px, min(2.7vw, 5vh), 56px);
  font-weight: bold;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 0;
  margin-bottom: clamp(8px, min(1.5vw, 1.8vh), 18px);
  border-width: clamp(2px, min(0.3vw, 0.5vh), 4px);
  flex-shrink: 0;
  line-height: 1.1;
}

body.wallboard-mode .summary-good {
  background: var(--wall-green-bg);
  color: #dcfce7;
  border-color: var(--green-border);
}

body.wallboard-mode .summary-warn {
  background: var(--wall-yellow-bg);
  color: #fef3c7;
  border-color: var(--yellow-border);
}

body.wallboard-mode .summary-bad {
  background: var(--wall-red-bg);
  color: #fee2e2;
  border-color: var(--red-border);
}

body.wallboard-mode .summary-grid {
  gap: clamp(8px, min(1.2vw, 1.4vh), 18px);
  margin-bottom: clamp(8px, min(1.5vw, 1.8vh), 18px);
  flex-shrink: 0;
}

body.wallboard-mode .summary-card {
  border-radius: clamp(12px, min(1.5vw, 1.8vh), 20px);
  padding: clamp(9px, min(1.4vw, 1.8vh), 18px) clamp(12px, min(1.6vw, 2vh), 22px);
  border-width: 2px;
  min-width: 0;
  overflow: hidden;
}

body.wallboard-mode .summary-label {
  font-size: clamp(12px, min(1vw, 1.9vh), 22px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

body.wallboard-mode .summary-value {
  font-size: clamp(26px, min(2.7vw, 5vh), 62px);
  line-height: 1;
}

body.wallboard-mode .controls { display: none; }

body.wallboard-mode .dashboard-grid {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  grid-template-rows: repeat(2, minmax(0, 1fr));
  gap: clamp(10px, min(1.6vw, 2vh), 24px);
  margin-top: 0;
}

body.wallboard-mode .card {
  border-radius: clamp(14px, min(1.8vw, 2vh), 24px);
  padding: clamp(12px, min(2vw, 2.5vh), 28px);
  min-height: 0;
  border-width: 2px;
  border-left-width: clamp(10px, min(1.2vw, 1.6vh), 16px);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  overflow: hidden;
  min-width: 0;
}

body.wallboard-mode .card.good-border { border-left-color: var(--green-border); }
body.wallboard-mode .card.warn-border { border-left-color: var(--yellow-border); }
body.wallboard-mode .card.bad-border { border-left-color: var(--red-border); }

body.wallboard-mode .service-name {
  font-size: clamp(22px, min(2.3vw, 4.5vh), 50px);
  font-weight: bold;
  margin-bottom: clamp(8px, min(1.5vw, 1.8vh), 20px);
  line-height: 1.08;
  max-width: 100%;
  overflow-wrap: break-word;
  word-break: normal;
}

body.wallboard-mode .badge {
  padding: clamp(6px, min(1vw, 1.2vh), 12px) clamp(10px, min(1.5vw, 1.8vh), 22px);
  border-radius: 999px;
  font-size: clamp(15px, min(1.5vw, 3vh), 32px);
  font-weight: bold;
  text-transform: uppercase;
  border: clamp(2px, min(0.25vw, 0.4vh), 3px) solid transparent;
  width: fit-content;
  max-width: 100%;
  line-height: 1.1;
  white-space: normal;
}

body.wallboard-mode .good {
  background: var(--wall-green-bg);
  color: #dcfce7;
  border-color: var(--green-border);
}

body.wallboard-mode .warn {
  background: var(--wall-yellow-bg);
  color: #fef3c7;
  border-color: var(--yellow-border);
}

body.wallboard-mode .bad {
  background: var(--wall-red-bg);
  color: #fee2e2;
  border-color: var(--red-border);
}

body.wallboard-mode .card-detail {
  margin-top: clamp(6px, min(1.3vw, 1.5vh), 18px);
  font-size: clamp(14px, min(1.3vw, 2.6vh), 30px);
  color: var(--dark-muted);
  line-height: 1.2;
}

body.wallboard-mode .footer-row {
  margin-top: clamp(6px, min(1.3vw, 1.5vh), 18px);
  display: flex;
  justify-content: space-between;
  gap: 20px;
  font-size: clamp(12px, min(1vw, 1.8vh), 24px);
  color: var(--dark-muted);
  flex-shrink: 0;
}

/* Wallboard light mode override */

body.wallboard-mode.wallboard-light {
  background: var(--light-bg);
  color: var(--light-text);
}

body.wallboard-mode.wallboard-light .header-time,
body.wallboard-mode.wallboard-light .summary-card,
body.wallboard-mode.wallboard-light .card {
  background: var(--light-panel);
  color: var(--light-text);
  border-color: var(--light-border);
}

body.wallboard-mode.wallboard-light .small,
body.wallboard-mode.wallboard-light .summary-label,
body.wallboard-mode.wallboard-light .time-label,
body.wallboard-mode.wallboard-light .date-value,
body.wallboard-mode.wallboard-light .card-detail,
body.wallboard-mode.wallboard-light .footer-row {
  color: var(--light-muted);
}

@media (max-width: 1000px) {
  body.wallboard-mode {
    overflow: auto;
    height: auto;
  }

  body.wallboard-mode .header-row {
    grid-template-columns: 1fr;
  }

  body.wallboard-mode .header-time {
    text-align: left;
    min-width: 0;
    width: 100%;
  }

  body.wallboard-mode .dashboard-grid {
    grid-template-columns: 1fr;
    grid-template-rows: none;
  }
}

@media (max-width: 800px) {
  .header-row { flex-direction: column; }
  .header-time { text-align: left; }
  .summary-grid { grid-template-columns: 1fr; }
  .dashboard-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="header-row">
  <div>
    <div class="test-label">TEST ENVIRONMENT</div>
    <h1 id="pageTitle">SaaS Status Dashboard</h1>
    <p class="small" id="pageSubtitle">Simple aggregated view of Cloudflare, Worldpay and AudienceView status pages</p>
  </div>

  <div id="currentTime" class="header-time"></div>
</div>

<div id="summaryBanner" class="summary-banner summary-good">
  Loading service status...
</div>

<div class="summary-grid">
  <div class="summary-card">
    <div class="summary-label">Services monitored</div>
    <div id="servicesMonitored" class="summary-value">0</div>
  </div>

  <div class="summary-card">
    <div class="summary-label">Services with issues</div>
    <div id="servicesWithIssues" class="summary-value">0</div>
  </div>

  <div class="summary-card">
    <div class="summary-label">Active incidents</div>
    <div id="activeIncidents" class="summary-value">0</div>
  </div>
</div>

<div class="controls">
  <button onclick="loadStatuses()">Refresh</button>
  <button onclick="toggleDarkMode()" id="darkModeButton">Dark Mode</button>
  <span id="lastRefresh" class="small"></span>
</div>

<div id="results" class="dashboard-grid"></div>

<div class="footer-row">
  <div id="wallboardLastRefresh">Last refreshed: Not yet refreshed</div>
  <div>Auto-refresh: every 60 seconds</div>
</div>

<script>
const providers = [
  {
    name: "Cloudflare",
    url: "https://www.cloudflarestatus.com/api/v2/summary.json",
    statusPage: "https://www.cloudflarestatus.com/"
  },
  {
    name: "Worldpay",
    url: "https://status.worldpay.com/api/v2/summary.json",
    statusPage: "https://status.worldpay.com/"
  },
  {
    name: "AudienceView Professional",
    url: "https://professional-status.audienceview.com/api/v2/summary.json",
    statusPage: "https://professional-status.audienceview.com/"
  },
  {
    name: "AudienceView Unlimited",
    url: "https://unlimited-status.audienceview.com/api/v2/summary.json",
    statusPage: "https://unlimited-status.audienceview.com/"
  }
];

function detectPageMode() {
  const path = window.location.pathname.toLowerCase();

  if (path.includes("/wallboard/") || path.includes("/wallboardtest/")) {
    document.body.classList.add("wallboard-mode");
    document.getElementById("pageTitle").innerText = "SaaS Status Wallboard";
    document.getElementById("pageSubtitle").innerText = "Live operational status for monitored SaaS services";
    return "wallboard";
  }

  if (path.includes("/test/")) {
    document.body.classList.add("test-mode");
    document.getElementById("pageTitle").innerText = "SaaS Status Dashboard";
    return "test";
  }

  document.body.classList.add("web-mode");
  return "web";
}

const pageMode = detectPageMode();

function toggleDarkMode() {
  if (pageMode === "wallboard") {
    document.body.classList.toggle("wallboard-light");

    const isWallboardLight = document.body.classList.contains("wallboard-light");
    localStorage.setItem("wallboardTheme", isWallboardLight ? "light" : "dark");

    return;
  }

  document.body.classList.toggle("dark-mode");

  const isDarkMode = document.body.classList.contains("dark-mode");
  localStorage.setItem("darkMode", isDarkMode ? "enabled" : "disabled");

  document.getElementById("darkModeButton").innerText = isDarkMode ? "Light Mode" : "Dark Mode";
}

function applySavedTheme() {
  if (pageMode === "wallboard") {
    const savedWallboardTheme = localStorage.getItem("wallboardTheme");

    if (savedWallboardTheme === "light") {
      document.body.classList.add("wallboard-light");
    }

    return;
  }

  const savedTheme = localStorage.getItem("darkMode");

  if (savedTheme === "enabled") {
    document.body.classList.add("dark-mode");
    document.getElementById("darkModeButton").innerText = "Light Mode";
  }
}

function handleBackgroundDoubleClick(event) {
  const ignoredElement = event.target.closest("button, a");

  if (ignoredElement) {
    return;
  }

  toggleDarkMode();
}

function updateCurrentTime() {
  const now = new Date();

  if (pageMode === "wallboard") {
    document.getElementById("currentTime").innerHTML =
      "<div class='time-label'>Current time</div>" +
      "<div class='time-value'>" +
      now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }) +
      "</div>" +
      "<div class='date-value'>" +
      now.toLocaleDateString([], {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      }) +
      "</div>";
  } else {
    document.getElementById("currentTime").innerText = "Current time: " + now.toLocaleString();
  }
}

function getStatusClass(status) {
  if (!status) return "warn";

  status = status.toLowerCase();

  if (status.includes("operational") || status.includes("all systems")) {
    return "good";
  }

  if (status.includes("degraded") || status.includes("minor") || status.includes("maintenance")) {
    return "warn";
  }

  return "bad";
}

function getSeverity(service) {
  const status = service.status.toLowerCase();

  if (service.status === "Unable to fetch") {
    return 3;
  }

  if (
    status.includes("critical") ||
    status.includes("major") ||
    status.includes("partial outage")
  ) {
    return 3;
  }

  if (
    status.includes("minor") ||
    status.includes("degraded") ||
    status.includes("maintenance") ||
    status.includes("service outage")
  ) {
    return 2;
  }

  if (service.incidents.length > 0) {
    return 2;
  }

  return 1;
}

function hasIssue(service) {
  return getSeverity(service) > 1;
}

function updateSummary(results) {
  const servicesMonitored = results.length;
  const servicesWithIssues = results.filter(hasIssue).length;
  const activeIncidents = results.reduce((total, service) => total + service.incidents.length, 0);
  const highestSeverity = Math.max(...results.map(getSeverity));

  document.getElementById("servicesMonitored").innerText = servicesMonitored;
  document.getElementById("servicesWithIssues").innerText = servicesWithIssues;
  document.getElementById("activeIncidents").innerText = activeIncidents;

  const banner = document.getElementById("summaryBanner");

  banner.classList.remove("summary-good", "summary-warn", "summary-bad");

  if (highestSeverity === 1) {
    banner.classList.add("summary-good");
    banner.innerText = pageMode === "wallboard"
      ? "All monitored services operational"
      : "All monitored services are currently operational";
  } else if (highestSeverity === 2) {
    banner.classList.add("summary-warn");
    banner.innerText = pageMode === "wallboard"
      ? "Minor service issue detected"
      : "One or more monitored services are reporting a minor issue, degraded performance or maintenance";
  } else {
    banner.classList.add("summary-bad");
    banner.innerText = pageMode === "wallboard"
      ? "Major service issue detected"
      : "One or more monitored services are reporting a major issue or could not be checked";
  }
}

async function fetchProvider(provider) {
  try {
    const res = await fetch(provider.url);
    const data = await res.json();

    return {
      name: provider.name,
      statusPage: provider.statusPage,
      status: data.status.description,
      incidents: data.incidents || [],
      updated: data.page.updated_at
    };
  } catch (err) {
    return {
      name: provider.name,
      statusPage: provider.statusPage,
      status: "Unable to fetch",
      incidents: [],
      updated: null
    };
  }
}

function formatUpdatedTime(value) {
  if (!value) return "Unknown";

  try {
    return new Date(value).toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });
  } catch (err) {
    return value;
  }
}

async function loadStatuses() {
  const container = document.getElementById("results");
  container.innerHTML = "<div class='card'>Loading...</div>";

  const results = await Promise.all(providers.map(fetchProvider));

  updateSummary(results);

  container.innerHTML = "";

  results.forEach(service => {
    const card = document.createElement("div");
    const badgeClass = getStatusClass(service.status);

    if (pageMode === "wallboard") {
      card.className = "card " + badgeClass + "-border";
    } else {
      card.className = "card";
    }

    let incidentHtml = "";

    if (pageMode !== "wallboard" && service.incidents.length > 0) {
      incidentHtml = "<ul>" + service.incidents.slice(0, 2).map(incident => {
        return "<li>" + incident.name + " - " + incident.status + "</li>";
      }).join("") + "</ul>";
    }

    if (pageMode === "wallboard") {
      card.innerHTML = `
        <div class="service-name">
          <a class="provider-link" href="${service.statusPage}" target="_blank" rel="noopener noreferrer">${service.name}</a>
        </div>
        <div class="badge ${badgeClass}">${service.status}</div>
        <div class="card-detail"><strong>Active incidents:</strong> ${service.incidents.length}</div>
        <div class="card-detail"><strong>Provider updated:</strong> ${formatUpdatedTime(service.updated)}</div>
      `;
    } else {
      card.innerHTML = `
        <h2>
          <a class="provider-link" href="${service.statusPage}" target="_blank" rel="noopener noreferrer">${service.name}</a>
        </h2>
        <div class="badge ${badgeClass}">${service.status}</div>
        <p class="small">Updated: ${service.updated || "Unknown"}</p>
        <p><strong>Active Incidents:</strong> ${service.incidents.length}</p>
        ${incidentHtml}
      `;
    }

    container.appendChild(card);
  });

  const refreshText = "Last refreshed: " + new Date().toLocaleString();

  document.getElementById("lastRefresh").innerText = refreshText;

  if (document.getElementById("wallboardLastRefresh")) {
    document.getElementById("wallboardLastRefresh").innerText = "Last refreshed: " + new Date().toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    });
  }
}

applySavedTheme();
updateCurrentTime();
loadStatuses();

document.addEventListener("dblclick", handleBackgroundDoubleClick);

setInterval(updateCurrentTime, 1000);
setInterval(loadStatuses, 60000);
</script>

</body>
</html>
