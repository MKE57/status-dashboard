<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SaaS Status" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <link rel="apple-touch-icon" href="https://mke57.github.io/status-dashboard/assets/logos/ATG.jpeg" />
  <link rel="icon" href="https://mke57.github.io/status-dashboard/assets/logos/ATG.jpeg" />
  <title>SaaS Status Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #e5e7eb;
      --panel: #1e293b;
      --border: #334155;
      --muted: #cbd5e1;
      --green-bg: #14532d;
      --green-text: #dcfce7;
      --green-border: #22c55e;
      --yellow-bg: #713f12;
      --yellow-text: #fef3c7;
      --yellow-border: #f59e0b;
      --red-bg: #7f1d1d;
      --red-text: #fee2e2;
      --red-border: #ef4444;
      --blue-bg: #1e3a8a;
      --blue-text: #dbeafe;
      --blue-border: #60a5fa;
    }

    body.wallboard-light {
      --bg: #f8fafc;
      --text: #0f172a;
      --panel: #ffffff;
      --border: #cbd5e1;
      --muted: #475569;
      --green-bg: #dcfce7;
      --green-text: #14532d;
      --green-border: #22c55e;
      --yellow-bg: #fef3c7;
      --yellow-text: #713f12;
      --yellow-border: #f59e0b;
      --red-bg: #fee2e2;
      --red-text: #7f1d1d;
      --red-border: #ef4444;
      --blue-bg: #dbeafe;
      --blue-text: #1e3a8a;
      --blue-border: #60a5fa;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      background: var(--bg);
      overscroll-behavior: none;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    *::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: clamp(10px, min(2vw, 2vh), 28px);
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .pull-refresh-indicator {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      left: 50%;
      transform: translate(-50%, -150%);
      z-index: 9999;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: bold;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .28);
      transition: transform 160ms ease, opacity 160ms ease, border-color 160ms ease;
      white-space: nowrap;
    }

    .pull-refresh-indicator.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .pull-refresh-indicator.ready {
      border-color: var(--green-border);
    }

    .header-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: clamp(10px, min(2vw, 2vh), 28px);
      align-items: start;
      margin-bottom: clamp(8px, min(1.5vw, 1.6vh), 18px);
      flex-shrink: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, min(3.2vw, 6vh), 64px);
      line-height: 1.05;
      letter-spacing: -1px;
    }

    .small {
      margin-top: clamp(3px, min(.6vw, .8vh), 8px);
      font-size: clamp(12px, min(1.1vw, 2.2vh), 24px);
      color: var(--muted);
    }

    .header-brand-logo {
      align-self: start;
      justify-self: center;
      height: clamp(96px, min(10vw, 18vh), 190px);
      max-width: clamp(280px, min(24vw, 44vh), 560px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: default;
    }

    .header-brand-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, .35));
    }

    .header-time {
      min-width: clamp(260px, 26vw, 380px);
      border-radius: 22px;
      padding: clamp(10px, min(1.6vw, 2vh), 20px) clamp(14px, min(1.8vw, 2.4vh), 24px);
      text-align: right;
      border: 2px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }

    .time-label {
      font-size: clamp(12px, min(1vw, 2vh), 22px);
      color: var(--muted);
      margin-bottom: 4px;
    }

    .time-value {
      font-size: clamp(28px, min(3vw, 6vh), 68px);
      font-weight: bold;
      line-height: 1;
    }

    .date-value {
      margin-top: 6px;
      font-size: clamp(12px, min(1.1vw, 2.2vh), 24px);
      color: var(--muted);
    }

    .summary-banner {
      border-radius: clamp(14px, min(1.8vw, 2vh), 24px);
      padding: clamp(12px, min(2vw, 2.8vh), 28px) clamp(16px, min(2.3vw, 3vh), 32px);
      font-size: clamp(22px, min(2.7vw, 5vh), 56px);
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin: 0 0 clamp(8px, min(1.5vw, 1.8vh), 18px) 0;
      border: clamp(2px, min(.3vw, .5vh), 4px) solid var(--green-border);
      flex-shrink: 0;
      line-height: 1.1;
      transition: opacity 220ms ease;
      user-select: none;
    }

    .summary-banner-text {
      display: inline-block;
      transition: opacity 220ms ease;
    }

    .summary-banner-text.hidden {
      opacity: 0;
    }

    .summary-good { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .summary-warn { background: var(--yellow-bg); color: var(--yellow-text); border-color: var(--yellow-border); }
    .summary-bad { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
    .summary-maintenance { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(8px, min(1.2vw, 1.4vh), 18px);
      margin-bottom: clamp(8px, min(1.5vw, 1.8vh), 18px);
      flex-shrink: 0;
      transition: opacity 220ms ease;
    }

    .summary-card {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: clamp(12px, min(1.5vw, 1.8vh), 20px);
      padding: clamp(9px, min(1.4vw, 1.8vh), 18px) clamp(12px, min(1.6vw, 2vh), 22px);
      overflow: hidden;
      min-width: 0;
    }

    .summary-label {
      font-size: clamp(12px, min(1vw, 1.9vh), 22px);
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-value {
      font-size: clamp(26px, min(2.7vw, 5vh), 62px);
      font-weight: bold;
      line-height: 1;
      margin-top: 4px;
    }

    .dashboard-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: clamp(10px, min(1.6vw, 2vh), 24px);
      transition: opacity 220ms ease;
    }

    .refreshing { opacity: .66; }

    .card {
      position: relative;
      background: var(--panel);
      border: 2px solid var(--border);
      border-left-width: clamp(10px, min(1.2vw, 1.6vh), 16px);
      border-radius: clamp(14px, min(1.8vw, 2vh), 24px);
      padding: clamp(12px, min(2vw, 2.5vh), 28px);
      min-height: 0;
      overflow: hidden;
    }

    .good-border { border-left-color: var(--green-border); }
    .warn-border { border-left-color: var(--yellow-border); }
    .bad-border { border-left-color: var(--red-border); }
    .maintenance-border { border-left-color: var(--blue-border); }

    .card-fit {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-auto-rows: min-content;
      align-content: start;
      column-gap: 12px;
      row-gap: var(--card-gap, 10px);
    }

    .service-header { grid-column: 1; min-width: 0; }

    .service-header h2 {
      font-size: var(--title-size, clamp(22px, min(2.3vw, 4.5vh), 50px));
      font-weight: bold;
      margin: 0;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .provider-link,
    .service-logo-link { color: inherit; text-decoration: none; }

    .service-logo-link {
      grid-column: 2;
      grid-row: 1 / span 2;
      display: inline-flex;
      align-self: start;
    }

    .service-logo {
      width: var(--logo-w, clamp(90px, min(7vw, 10vh), 160px));
      height: var(--logo-h, clamp(50px, min(4vw, 7vh), 90px));
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: clamp(10px, min(1vw, 1.5vh), 18px);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .95);
      color: #1f2937;
      padding: 8px;
      overflow: hidden;
      font-weight: bold;
    }

    .service-logo img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

    .badge {
      grid-column: 1;
      width: fit-content;
      max-width: 100%;
      padding: var(--badge-py, clamp(6px, min(1vw, 1.2vh), 12px)) var(--badge-px, clamp(10px, min(1.5vw, 1.8vh), 22px));
      border-radius: 999px;
      font-size: var(--badge-size, clamp(15px, min(1.5vw, 3vh), 32px));
      font-weight: bold;
      text-transform: uppercase;
      border: clamp(2px, min(.25vw, .4vh), 3px) solid transparent;
      line-height: 1.1;
    }

    .good { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .warn { background: var(--yellow-bg); color: var(--yellow-text); border-color: var(--yellow-border); }
    .bad { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }
    .maintenance { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }

    .card-detail {
      grid-column: 1 / -1;
      margin: 0;
      font-size: var(--detail-size, clamp(14px, min(1.3vw, 2.6vh), 30px));
      color: var(--muted);
      line-height: 1.2;
      min-width: 0;
    }

    .maintenance-line { color: var(--blue-text); }
    .provider-updated-line { padding-right: 34px; }

    .mobile-details,
    .mobile-card-toggle { display: none; }

    .detail-block {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .detail-heading { font-weight: bold; margin: 0 0 6px; }
    .detail-list { margin-top: 6px; padding-left: 20px; }
    .detail-list li { margin-bottom: 6px; }

    .detail-pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      margin-right: 6px;
    }

    .detail-pill.warn { background: #fef3c7; color: #92400e; }
    .detail-pill.bad { background: #fee2e2; color: #991b1b; }
    .detail-pill.maintenance { background: #dbeafe; color: #1e3a8a; }

    .footer-row {
      margin-top: clamp(6px, min(1.3vw, 1.5vh), 18px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
      font-size: clamp(12px, min(1vw, 1.8vh), 24px);
      color: var(--muted);
      flex-shrink: 0;
    }

    .footer-row div:nth-child(1) { text-align: left; }
    .footer-row div:nth-child(2) { text-align: center; }
    .footer-row div:nth-child(3) { text-align: right; }
    .footer-status-text { transition: opacity 220ms ease; }
    .footer-status-text.fading { opacity: 0; }

    @media (min-width: 1001px) {
      .card.expanded { overflow: auto; }
      .card.expanded .mobile-details {
        display: grid;
        grid-column: 1 / -1;
        grid-template-rows: 1fr;
        opacity: 1;
        margin-top: 12px;
      }
      .card.expanded .mobile-details-inner { overflow: visible; }
      .card.expanded .mobile-details .detail-block:first-child { margin-top: 0; }
    }

    @media (max-width: 1000px) {
      body { overflow: auto; height: auto; }
      .header-row { grid-template-columns: minmax(0, 1fr) auto; }
      .header-time { display: none; }
      .header-brand-logo { justify-self: end; width: 74px; height: 74px; max-width: 74px; flex-shrink: 0; }
      .header-brand-logo img { width: 100%; height: 100%; object-fit: contain; }
      .dashboard-grid { grid-template-columns: 1fr; grid-template-rows: none; }
      .card-fit { row-gap: 0; }
      .service-header h2 { font-size: clamp(22px, min(2.3vw, 4.5vh), 50px); margin: 0 0 clamp(8px, min(1.5vw, 1.8vh), 20px); }
      .badge { font-size: clamp(15px, min(1.5vw, 3vh), 32px); padding: clamp(6px, min(1vw, 1.2vh), 12px) clamp(10px, min(1.5vw, 1.8vh), 22px); }
      .card-detail { font-size: clamp(14px, min(1.3vw, 2.6vh), 30px); margin-top: clamp(6px, min(1.3vw, 1.5vh), 18px); }
      .service-logo { width: clamp(90px, min(7vw, 10vh), 160px); height: clamp(50px, min(4vw, 7vh), 90px); }
      .mobile-card-toggle, .mobile-details { display: grid; }
      .mobile-card-toggle {
        align-items: center;
        justify-content: center;
        position: absolute;
        right: 8px;
        bottom: 8px;
        width: 26px;
        height: 26px;
        border: none;
        background: transparent;
        color: currentColor;
        opacity: .55;
        z-index: 2;
      }
      .mobile-card-toggle:hover, .mobile-card-toggle:focus-visible { opacity: .8; outline: none; }
      .mobile-card-toggle::before {
        content: "";
        width: 13px;
        height: 13px;
        border-right: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: rotate(45deg);
        transition: transform 180ms ease;
      }
      .card.expanded .mobile-card-toggle::before { transform: rotate(225deg); }
      .mobile-details {
        grid-column: 1 / -1;
        grid-template-rows: 0fr;
        opacity: 0;
        margin-top: 0;
        transition: grid-template-rows 220ms ease, opacity 180ms ease, margin-top 180ms ease;
      }
      .mobile-details-inner { overflow: hidden; }
      .card.expanded .mobile-details { grid-template-rows: 1fr; opacity: 1; margin-top: 12px; }
      .mobile-details .detail-block:first-child { margin-top: 0; }
    }

    @media (max-width: 520px) {
      .summary-grid { gap: 8px; }
      .summary-card { padding: 10px; }
      .summary-label { font-size: 11px; }
      .summary-value { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="pullRefreshIndicator" class="pull-refresh-indicator">Pull to refresh</div>

  <div class="header-row">
    <div>
      <h1>SaaS Status Dashboard</h1>
      <p class="small">Live operational status for SaaS services</p>
    </div>
    <div class="header-brand-logo" aria-label="ATG logo">
      <img src="https://mke57.github.io/status-dashboard/assets/logos/ATG.jpeg" alt="ATG logo" />
    </div>
    <div id="currentTime" class="header-time"></div>
  </div>

  <div id="summaryBanner" class="summary-banner summary-good">
    <span id="summaryBannerText" class="summary-banner-text">Loading service status...</span>
  </div>

  <div id="summaryGrid" class="summary-grid">
    <div class="summary-card"><div class="summary-label">Services monitored</div><div id="servicesMonitored" class="summary-value">0</div></div>
    <div class="summary-card"><div class="summary-label">Services with issues</div><div id="servicesWithIssues" class="summary-value">0</div></div>
    <div class="summary-card"><div class="summary-label">Active incidents</div><div id="activeIncidents" class="summary-value">0</div></div>
  </div>

  <div id="results" class="dashboard-grid"></div>

  <div class="footer-row">
    <div id="lastRefreshFooter">Last refreshed: Not yet refreshed</div>
    <div id="autoRefreshFooter" class="footer-status-text">Next refresh in: 60s</div>
    <div id="dashboardMeta">Version: v0.5.48 | Built and maintained by Mike Ahrens</div>
  </div>

  <script>
    const providers = [
      { name: "Cloudflare", url: "https://www.cloudflarestatus.com/api/v2/summary.json", incidentsUrl: "https://www.cloudflarestatus.com/api/v2/incidents.json", statusPage: "https://www.cloudflarestatus.com/", logoText: "CF", logoSrc: "https://mke57.github.io/status-dashboard/assets/logos/cloudflare.png" },
      { name: "Worldpay", url: "https://status.worldpay.com/api/v2/summary.json", incidentsUrl: "https://status.worldpay.com/api/v2/incidents.json", statusPage: "https://status.worldpay.com/", logoText: "WP", logoSrc: "https://mke57.github.io/status-dashboard/assets/logos/worldpay.png" },
      { name: "AudienceView Professional", url: "https://professional-status.audienceview.com/api/v2/summary.json", incidentsUrl: "https://professional-status.audienceview.com/api/v2/incidents.json", statusPage: "https://professional-status.audienceview.com/", logoText: "AVP", logoSrc: "https://mke57.github.io/status-dashboard/assets/logos/audienceview.webp" },
      { name: "AudienceView Unlimited", url: "https://unlimited-status.audienceview.com/api/v2/summary.json", incidentsUrl: "https://unlimited-status.audienceview.com/api/v2/incidents.json", statusPage: "https://unlimited-status.audienceview.com/", logoText: "AVU", logoSrc: "https://mke57.github.io/status-dashboard/assets/logos/audienceview.webp" }
    ];

    const dashboardVersion = "v0.5.48";
    const dashboardMaintainer = "Mike Ahrens";
    const refreshIntervalMs = 60000;
    const fadeDurationMs = 220;
    const easterEggDisplayMs = 4000;
    const easterEggStorageKey = "statusDashboardEasterEggIndex";
    const themeStorageKey = "wallboardTheme";

    const easterEggMessages = ["THE DASHBOARD IS PLEASED", "STATUS GOBLIN SAYS HELLO", "ALL SYSTEMS ARE FEELING FABULOUS", "NO INCIDENTS, ONLY VIBES", "EVERYTHING IS SHINY", "OPERATIONAL AND LOOKING GOOD", "THE PIXELS ARE BEHAVING", "MONITORING MODE: COSY", "QUIET DAY, HAPPY DASHBOARD", "REFRESH GOBLIN FED SUCCESSFULLY", "THE STATUS ORACLE IS CONTENT", "GREEN IS A LOVELY COLOUR", "NO DRAMA DETECTED", "SERVICE GREMLINS CURRENTLY ASLEEP", "THE STATUS SPRITES APPROVE", "ALL QUIET ON THE DIGITAL FRONT", "NOTHING TO SEE HERE, LOVELY", "THE SERVERS ARE HAVING A NICE DAY", "DASHBOARD VIBES: IMMACULATE", "THE INCIDENT CUPBOARD IS EMPTY", "EVERYTHING IS TICKETY-BOO", "OPERATIONAL BLISS ACHIEVED", "THE GREEN LIGHTS ARE GREENING", "NO CHAOS CURRENTLY SCHEDULED", "THE SYSTEMS ARE BEING VERY POLITE", "ALL CALM IN THE CONTROL ROOM", "WE LOVE A QUIET STATUS PAGE", "THE SERVICE FAIRIES ARE ON DUTY", "ABSOLUTELY NOTHING DRAMATIC TO REPORT", "PEACE REIGNS ACROSS THE DASHBOARD", "THE MONITORING HAMSTER IS CONTENT", "STATUS: DELIGHTFULLY UNEVENTFUL", "THE REFRESH PIXIES ARE SATISFIED", "THE SYSTEMS ARE BEHAVING THEMSELVES", "BUSINESS AS BEAUTIFUL", "ALL QUIET, JUST HOW WE LIKE IT", "ZERO DRAMA, MAXIMUM UPTIME", "THE STATUS LIGHTS ARE ALL GREEN", "TODAY IS A GOOD DAY FOR SYSTEMS", "EVERYTHING IS RUNNING NICE AND SMOOTH", "NO NEWS IS VERY GOOD NEWS"];

    let autoRefreshTimer = null;
    let isLoadingStatuses = false;
    let cardFitResizeTimer = null;
    let countdownTimer = null;
    let nextRefreshAt = null;
    let easterEggActive = false;
    let lastTapAt = 0;
    let logoTapCount = 0;
    let logoTapTimer = null;
    let pullStartY = null;
    let pullDistance = 0;
    let pullRefreshTriggered = false;
    let pullRefreshGestureCaptured = false;
    const pullRefreshThreshold = 140;
    const pullRefreshStartThreshold = 24;
    let latestBannerState = { text: "All services operational", className: "summary-good", canUseEasterEgg: false };

    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function anyCardExpanded() { return document.querySelector(".card.expanded") !== null; }

    function setFooterText(text, fade = true) {
      const footer = document.getElementById("autoRefreshFooter");
      if (!footer) return;
      if (!fade) { footer.innerText = text; return; }
      footer.classList.add("fading");
      setTimeout(() => { footer.innerText = text; footer.classList.remove("fading"); }, fadeDurationMs);
    }

    function updateCountdownFooter() {
      if (anyCardExpanded()) { setFooterText("Auto-refresh: paused while details are expanded", false); return; }
      if (!nextRefreshAt) { setFooterText("Next refresh in: " + Math.ceil(refreshIntervalMs / 1000) + "s", false); return; }
      const remainingSeconds = Math.max(0, Math.ceil((nextRefreshAt - Date.now()) / 1000));
      setFooterText("Next refresh in: " + remainingSeconds + "s", false);
    }

    function startCountdown() { stopCountdown(); nextRefreshAt = Date.now() + refreshIntervalMs; updateCountdownFooter(); countdownTimer = setInterval(updateCountdownFooter, 1000); }
    function stopCountdown() { if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } }
    function startAutoRefresh() { if (autoRefreshTimer || anyCardExpanded()) return; autoRefreshTimer = setInterval(() => { if (!anyCardExpanded()) loadStatuses(); }, refreshIntervalMs); }
    function stopAutoRefresh() { if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; } }
    function updateAutoRefreshState() { if (anyCardExpanded()) { stopAutoRefresh(); stopCountdown(); setFooterText("Auto-refresh: paused while details are expanded"); } else { startAutoRefresh(); startCountdown(); } }

    function toggleHiddenTheme() {
      document.body.classList.toggle("wallboard-light");
      localStorage.setItem(themeStorageKey, document.body.classList.contains("wallboard-light") ? "light" : "dark");
      scheduleDesktopCardFit();
    }

    function handleLogoTap(event) {
      event.preventDefault();
      logoTapCount += 1;
      clearTimeout(logoTapTimer);
      logoTapTimer = setTimeout(() => { logoTapCount = 0; }, 900);
      if (logoTapCount >= 4) {
        logoTapCount = 0;
        clearTimeout(logoTapTimer);
        toggleHiddenTheme();
      }
    }

    function applySavedTheme() {
      if (localStorage.getItem(themeStorageKey) === "light") document.body.classList.add("wallboard-light");
    }

    function setCardExpanded(card, isExpanded) {
      card.classList.toggle("expanded", isExpanded);
      const button = card.querySelector(".mobile-card-toggle");
      if (button) {
        button.setAttribute("aria-expanded", isExpanded ? "true" : "false");
        button.setAttribute("title", isExpanded ? "Collapse details" : "Expand details");
      }
      updateAutoRefreshState();
    }

    function toggleCardExpanded(card) { setCardExpanded(card, !card.classList.contains("expanded")); }
    function toggleMobileCardDetails(button) { toggleCardExpanded(button.closest(".card")); }

    function updateCurrentTime() {
      const now = new Date();
      document.getElementById("currentTime").innerHTML = "<div class='time-label'>Current time</div><div class='time-value'>" + now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }) + "</div><div class='date-value'>" + now.toLocaleDateString([], { weekday: "long", day: "2-digit", month: "long", year: "numeric" }) + "</div>";
    }

    function itemText(item, field) { return (item && item[field] ? String(item[field]) : "").toLowerCase(); }
    function latestUpdateBody(item) { return ((item.incident_updates && item.incident_updates[0] && item.incident_updates[0].body) || ""); }

    function isMaintenanceNotice(item) {
      const name = itemText(item, "name"), status = itemText(item, "status"), impact = itemText(item, "impact"), body = latestUpdateBody(item).toLowerCase();
      return name.includes("scheduled maintenance") || name.includes("maintenance notice") || name.includes("upcoming maintenance") || impact === "maintenance" || body.includes("scheduled maintenance") || body.includes("system maintenance") || status === "scheduled";
    }

    function isUpcomingMaintenanceNotice(item) {
      const name = itemText(item, "name"), status = itemText(item, "status"), body = latestUpdateBody(item).toLowerCase();
      return status === "scheduled" || name.includes("upcoming") || body.includes("upcoming") || body.includes("we'll be performing") || body.includes("we will be performing") || body.includes("we’ll be performing");
    }

    function dateValue(value) { const date = value ? new Date(value) : null; return date && !Number.isNaN(date.getTime()) ? date : null; }

    function parseMaintenanceDateFromText(item) {
      const text = ((item.name || "") + " " + latestUpdateBody(item)).replace(/\s+/g, " ");
      const months = { january: 0, february: 1, march: 2, april: 3, may: 4, june: 5, july: 6, august: 7, september: 8, october: 9, november: 10, december: 11 };
      const match = text.match(/(?:monday|tuesday|wednesday|thursday|friday|saturday|sunday)?\s*,?\s*(january|february|march|april|may|june|july|august|september|october|november|december)\s+(\d{1,2})(?:,\s*(\d{4}))?\s+at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)\s*(est|edt|utc|gmt|bst)?/i);
      if (!match) return null;
      let year = match[3] ? Number(match[3]) : new Date().getFullYear();
      let hour = Number(match[4]);
      const minute = match[5] ? Number(match[5]) : 0;
      const meridiem = match[6].toLowerCase();
      const timezone = (match[7] || "UTC").toUpperCase();
      if (meridiem === "pm" && hour !== 12) hour += 12;
      if (meridiem === "am" && hour === 12) hour = 0;
      const offsets = { EST: -5, EDT: -4, UTC: 0, GMT: 0, BST: 1 };
      const offset = offsets[timezone] ?? 0;
      let parsed = new Date(Date.UTC(year, months[match[1].toLowerCase()], Number(match[2]), hour - offset, minute));
      if (parsed < new Date(Date.now() - 7 * 24 * 60 * 60 * 1000) && !match[3]) {
        year += 1;
        parsed = new Date(Date.UTC(year, months[match[1].toLowerCase()], Number(match[2]), hour - offset, minute));
      }
      return parsed;
    }

    function getMaintenanceDate(item) { return dateValue(item.scheduled_for) || parseMaintenanceDateFromText(item) || dateValue(item.created_at) || dateValue(item.updated_at); }
    function isWithinNext24Hours(value) { const date = value instanceof Date ? value : dateValue(value); if (!date) return false; const diff = date - new Date(); return diff >= 0 && diff <= 24 * 60 * 60 * 1000; }
    function isMaintenanceActive(maintenance) { const now = new Date(), status = itemText(maintenance, "status"), start = dateValue(maintenance.scheduled_for), end = dateValue(maintenance.scheduled_until); return status === "in_progress" || status === "verifying" || (start && end && now >= start && now <= end); }
    function isMaintenanceUpcomingWithin24Hours(maintenance) { return !isMaintenanceActive(maintenance) && isWithinNext24Hours(getMaintenanceDate(maintenance)); }

    function isMajorIncident(incident) {
      const impact = itemText(incident, "impact"), name = itemText(incident, "name"), status = itemText(incident, "status");
      return impact.includes("major") || impact.includes("critical") || name.includes("major") || name.includes("critical") || status.includes("major") || status.includes("critical");
    }

    function getSeverity(service) { if (service.status === "Unable to fetch") return 3; if (service.activeIncidents.some(isMajorIncident)) return 3; if (service.activeIncidents.length > 0) return 2; return 1; }
    function hasActiveMaintenance(service) { return service.activeMaintenances.length > 0; }
    function hasUpcomingMaintenance(service) { return service.upcomingMaintenances.length > 0; }
    function getStatusClass(service) { const severity = getSeverity(service); if (severity === 3) return "bad"; if (severity === 2) return "warn"; if (hasActiveMaintenance(service) || hasUpcomingMaintenance(service)) return "maintenance"; return "good"; }
    function getCardBorderClass(service) { const severity = getSeverity(service); if (severity === 3) return "bad-border"; if (severity === 2) return "warn-border"; if (hasActiveMaintenance(service) || hasUpcomingMaintenance(service)) return "maintenance-border"; return "good-border"; }
    function getDisplayStatus(service) { const severity = getSeverity(service); if (service.status === "Unable to fetch") return "Unable to fetch"; if (severity === 3) return "Major incident"; if (service.activeIncidents.length > 0) return "Active incident"; if (service.activeMaintenances.length > 0) return "Maintenance"; if (service.upcomingMaintenances.length > 0) return window.innerWidth <= 390 ? "Upcoming maint." : "Upcoming maintenance"; return "Operational"; }
    function hasIssue(service) { return service.status === "Unable to fetch" || service.activeIncidents.length > 0; }
    function getActiveIssueCount(service) { return service.activeIncidents.length; }
    function getActiveMaintenanceCount(service) { return service.activeMaintenances.length; }

    function setBannerClass(className) { const banner = document.getElementById("summaryBanner"); banner.classList.remove("summary-good", "summary-warn", "summary-bad", "summary-maintenance"); banner.classList.add(className); }
    async function setBannerTextAnimated(text) { const bannerText = document.getElementById("summaryBannerText"); bannerText.classList.add("hidden"); await sleep(fadeDurationMs); bannerText.innerText = text; bannerText.classList.remove("hidden"); await sleep(fadeDurationMs); }
    function applyBannerState(immediate = false) { setBannerClass(latestBannerState.className); if (immediate) document.getElementById("summaryBannerText").innerText = latestBannerState.text; else setBannerTextAnimated(latestBannerState.text); }

    function updateSummary(resultsData) {
      const highestSeverity = Math.max(...resultsData.map(getSeverity));
      const servicesWithIssues = resultsData.filter(hasIssue).length;
      const activeIssueTotal = resultsData.reduce((total, service) => total + getActiveIssueCount(service), 0);
      const activeMaintenanceTotal = resultsData.reduce((total, service) => total + getActiveMaintenanceCount(service), 0);
      document.getElementById("servicesMonitored").innerText = resultsData.length;
      document.getElementById("servicesWithIssues").innerText = servicesWithIssues;
      document.getElementById("activeIncidents").innerText = activeIssueTotal;
      if (highestSeverity === 3) latestBannerState = { text: "Major incident reported", className: "summary-bad", canUseEasterEgg: false };
      else if (activeIssueTotal > 0) latestBannerState = { text: "Active incident reported", className: "summary-warn", canUseEasterEgg: false };
      else if (activeMaintenanceTotal > 0) latestBannerState = { text: "Maintenance in progress", className: "summary-maintenance", canUseEasterEgg: false };
      else latestBannerState = { text: "All services operational", className: "summary-good", canUseEasterEgg: servicesWithIssues === 0 };
      if (!easterEggActive) applyBannerState(true);
    }

    function getNextEasterEggMessage() { const storedIndex = Number(localStorage.getItem(easterEggStorageKey)); const safeIndex = Number.isFinite(storedIndex) && storedIndex >= 0 ? storedIndex : 0; const message = easterEggMessages[safeIndex % easterEggMessages.length]; localStorage.setItem(easterEggStorageKey, String((safeIndex + 1) % easterEggMessages.length)); return message; }
    async function triggerEasterEgg() { if (!latestBannerState.canUseEasterEgg || easterEggActive) return; easterEggActive = true; const message = getNextEasterEggMessage(); await setBannerTextAnimated(message); await sleep(easterEggDisplayMs); await setBannerTextAnimated(latestBannerState.text); easterEggActive = false; }
    function handleBannerTap() { if (!latestBannerState.canUseEasterEgg || easterEggActive) return; const now = Date.now(); if (now - lastTapAt < 450) { lastTapAt = 0; triggerEasterEgg(); } else lastTapAt = now; }

    async function fetchProvider(provider) {
      try {
        const [summaryResponse, incidentResponse] = await Promise.all([fetch(provider.url), fetch(provider.incidentsUrl)]);
        const summaryData = await summaryResponse.json();
        const incidentData = await incidentResponse.json();
        const rawIncidents = summaryData.incidents || [];
        const scheduledMaintenances = summaryData.scheduled_maintenances || [];
        const maintenanceNotices = rawIncidents.filter(isMaintenanceNotice);
        return {
          name: provider.name,
          statusPage: provider.statusPage,
          logoText: provider.logoText,
          logoSrc: provider.logoSrc,
          status: summaryData.status.description,
          activeIncidents: rawIncidents.filter(incident => !isMaintenanceNotice(incident)),
          activeMaintenances: scheduledMaintenances.filter(isMaintenanceActive),
          upcomingMaintenances: scheduledMaintenances.filter(isMaintenanceUpcomingWithin24Hours).concat(maintenanceNotices.filter(isUpcomingMaintenanceNotice).filter(isMaintenanceUpcomingWithin24Hours)),
          recentIncidents: incidentData.incidents || [],
          updated: summaryData.page.updated_at
        };
      } catch (error) {
        return { name: provider.name, statusPage: provider.statusPage, logoText: provider.logoText, logoSrc: provider.logoSrc, status: "Unable to fetch", activeIncidents: [], activeMaintenances: [], upcomingMaintenances: [], recentIncidents: [], updated: null };
      }
    }

    function formatDateTime(value) { if (!value) return "Unknown"; try { return new Date(value).toLocaleString([], { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" }); } catch (error) { return value; } }
    function formatUpdatedTime(value) { if (!value) return "Unknown"; try { return new Date(value).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); } catch (error) { return value; } }
    function formatMaintenanceTime(maintenance) { const date = getMaintenanceDate(maintenance); return date ? formatDateTime(date) : "See provider status page"; }
    function timeAgo(value) { if (!value) return "Unknown"; const date = new Date(value); if (Number.isNaN(date.getTime())) return "Unknown"; const minutes = Math.max(0, Math.floor((new Date() - date) / 60000)), hours = Math.floor(minutes / 60), days = Math.floor(hours / 24); if (days > 0) return days + "d " + (hours % 24) + "h ago"; if (hours > 0) return hours + "h " + (minutes % 60) + "m ago"; if (minutes > 0) return minutes + "m ago"; return "just now"; }
    function incidentPillClass(incident) { return isMaintenanceNotice(incident) ? "maintenance" : isMajorIncident(incident) ? "bad" : "warn"; }
    function sortIncidentsNewestFirst(incidents) { return [...incidents].sort((a, b) => new Date(b.updated_at || b.resolved_at || b.created_at || 0) - new Date(a.updated_at || a.resolved_at || a.created_at || 0)); }
    function escapeHtml(value) { return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function logoHtml(service) { return `<a class="service-logo-link" href="${service.statusPage}" target="_blank" rel="noopener noreferrer" aria-label="Open ${escapeHtml(service.name)} status page"><div class="service-logo"><img src="${service.logoSrc}" alt="${escapeHtml(service.name)} logo" onerror="this.style.display='none';this.parentElement.textContent='${service.logoText}';"></div></a>`; }
    function maintenanceSummaryHtml(service) { const activeMaintenance = service.activeMaintenances[0], upcomingMaintenance = service.upcomingMaintenances[0]; if (activeMaintenance) return `<div class="card-detail maintenance-line"><strong>Maintenance:</strong> in progress</div>`; if (upcomingMaintenance) return `<div class="card-detail maintenance-line"><strong>Upcoming maintenance:</strong> ${formatMaintenanceTime(upcomingMaintenance)}</div>`; return ""; }

    function buildIncidentDetails(service) {
      const sortedIncidents = sortIncidentsNewestFirst(service.recentIncidents), latestIncident = sortedIncidents[0], resolvedIncidents = sortIncidentsNewestFirst(service.recentIncidents.filter(incident => incident.status === "resolved" && !isMaintenanceNotice(incident))).slice(0, 3);
      let detailsHtml = "";
      if (service.activeMaintenances.length > 0) detailsHtml += `<div class="detail-block"><p class="detail-heading">Maintenance in progress</p><ul class="detail-list">${service.activeMaintenances.slice(0, 2).map(maintenance => `<li><span class="detail-pill maintenance">Maintenance</span>${escapeHtml(maintenance.name)} - ${formatMaintenanceTime(maintenance)}</li>`).join("")}</ul></div>`;
      else if (service.upcomingMaintenances.length > 0) detailsHtml += `<div class="detail-block"><p class="detail-heading">Upcoming maintenance within 24 hours</p><ul class="detail-list">${service.upcomingMaintenances.slice(0, 2).map(maintenance => `<li><span class="detail-pill maintenance">Scheduled</span>${escapeHtml(maintenance.name)} - ${formatMaintenanceTime(maintenance)}</li>`).join("")}</ul></div>`;
      if (service.activeIncidents.length > 0) detailsHtml += `<div class="detail-block"><p class="detail-heading">Active incident details</p><ul class="detail-list">${service.activeIncidents.slice(0, 2).map(incident => `<li><span class="detail-pill ${incidentPillClass(incident)}">${isMajorIncident(incident) ? "Major" : "Active"}</span>${escapeHtml(incident.name)} - updated ${formatDateTime(incident.updated_at || incident.created_at)}</li>`).join("")}</ul></div>`;
      if (resolvedIncidents.length > 0) detailsHtml += `<div class="detail-block"><p class="detail-heading">Last 3 resolved incidents</p><ul class="detail-list">${resolvedIncidents.map(incident => { const date = incident.updated_at || incident.resolved_at || incident.created_at; return `<li>${escapeHtml(incident.name)} - ${formatDateTime(date)} (${timeAgo(date)})</li>`; }).join("")}</ul></div>`;
      else if (latestIncident && !isMaintenanceNotice(latestIncident)) detailsHtml += `<div class="detail-block"><p class="detail-heading">Latest provider update</p><ul class="detail-list"><li><span class="detail-pill ${incidentPillClass(latestIncident)}">${latestIncident.status || "Update"}</span>${escapeHtml(latestIncident.name)} - updated ${formatDateTime(latestIncident.updated_at || latestIncident.created_at)} (${timeAgo(latestIncident.updated_at || latestIncident.created_at)})</li></ul></div>`;
      else detailsHtml += `<div class="detail-block"><p class="detail-heading">Incident history</p><p class="small">No recent non-maintenance incident history reported by this provider.</p></div>`;
      return detailsHtml;
    }

    function clampNumber(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function setCardSizing(card, scale) { const height = card.clientHeight || 220; card.style.setProperty("--title-size", clampNumber(height * .16 * scale, 22, 56) + "px"); card.style.setProperty("--badge-size", clampNumber(height * .105 * scale, 15, 36) + "px"); card.style.setProperty("--badge-py", clampNumber(height * .035 * scale, 5, 14) + "px"); card.style.setProperty("--badge-px", clampNumber(height * .07 * scale, 10, 28) + "px"); card.style.setProperty("--detail-size", clampNumber(height * .09 * scale, 14, 32) + "px"); card.style.setProperty("--card-gap", clampNumber(height * .04 * scale, 5, 18) + "px"); card.style.setProperty("--logo-w", clampNumber(height * .42 * scale, 64, 165) + "px"); card.style.setProperty("--logo-h", clampNumber(height * .26 * scale, 42, 100) + "px"); }
    function clearDesktopCardSizing(card) { ["--title-size", "--badge-size", "--badge-py", "--badge-px", "--detail-size", "--card-gap", "--logo-w", "--logo-h"].forEach(propertyName => card.style.removeProperty(propertyName)); }

    function fitDesktopCards() {
      const cards = Array.from(document.querySelectorAll(".card"));
      if (window.innerWidth <= 1000) { cards.forEach(clearDesktopCardSizing); return; }
      let globalScale = 1;
      for (let attempt = 0; attempt < 10; attempt += 1) {
        cards.forEach(card => setCardSizing(card, globalScale));
        let nextScale = globalScale;
        cards.forEach(card => {
          const content = card.querySelector(".card-fit");
          if (!content) return;
          const style = getComputedStyle(card), verticalPadding = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom), available = card.clientHeight - verticalPadding, required = content.scrollHeight;
          if (available && required && required > available - 2) nextScale = Math.min(nextScale, globalScale * ((available - 2) / required));
        });
        nextScale = clampNumber(nextScale, .55, 1);
        if (Math.abs(nextScale - globalScale) < .005) break;
        globalScale = nextScale;
      }
      cards.forEach(card => setCardSizing(card, globalScale));
    }

    function scheduleDesktopCardFit() { clearTimeout(cardFitResizeTimer); cardFitResizeTimer = setTimeout(fitDesktopCards, 60); }
    function setRefreshing(isRefreshing) { document.getElementById("results").classList.toggle("refreshing", isRefreshing); document.getElementById("summaryGrid").classList.toggle("refreshing", isRefreshing); }
    function refitViewportAfterOrientationChange() { const viewportMeta = document.getElementById("viewportMeta"); if (viewportMeta) viewportMeta.setAttribute("content", "width=device-width, initial-scale=1.0"); window.scrollTo(0, 0); setTimeout(() => { if (viewportMeta) viewportMeta.setAttribute("content", "width=device-width, initial-scale=1.0"); scheduleDesktopCardFit(); }, 250); setTimeout(scheduleDesktopCardFit, 600); }
    function getReloadUrlWithCacheBust() { const url = new URL(window.location.href); url.searchParams.set("reload", Date.now().toString()); return url.toString(); }
    function setPullRefreshIndicator(text, stateClass) { const indicator = document.getElementById("pullRefreshIndicator"); if (!indicator) return; indicator.textContent = text; indicator.classList.toggle("visible", Boolean(text)); indicator.classList.toggle("ready", stateClass === "ready"); }

    function resetPullRefreshState() {
      pullStartY = null;
      pullDistance = 0;
      pullRefreshTriggered = false;
      pullRefreshGestureCaptured = false;
      setPullRefreshIndicator("", "");
    }

    function handlePullRefreshStart(event) {
      if (window.scrollY !== 0) return;
      if (!event.touches || event.touches.length !== 1) return;
      pullStartY = event.touches[0].clientY;
      pullDistance = 0;
      pullRefreshTriggered = false;
      pullRefreshGestureCaptured = false;
    }

    function handlePullRefreshMove(event) {
      if (pullStartY === null) return;

      if (!event.touches || event.touches.length !== 1) {
        resetPullRefreshState();
        return;
      }

      pullDistance = event.touches[0].clientY - pullStartY;

      if (window.scrollY !== 0 && !pullRefreshGestureCaptured) {
        resetPullRefreshState();
        return;
      }

      if (pullRefreshGestureCaptured || pullDistance > pullRefreshStartThreshold) {
        pullRefreshGestureCaptured = true;
        event.preventDefault();
      }

      if (pullDistance <= pullRefreshStartThreshold) {
        pullRefreshTriggered = false;
        setPullRefreshIndicator("", "");
        return;
      }

      if (pullDistance < pullRefreshThreshold) {
        pullRefreshTriggered = false;
        setPullRefreshIndicator("Pull to refresh", "pulling");
        return;
      }

      pullRefreshTriggered = true;
      setPullRefreshIndicator("Release to refresh", "ready");
    }

    function handlePullRefreshEnd() {
      const shouldRefresh = pullRefreshTriggered && pullDistance >= pullRefreshThreshold;

      if (shouldRefresh) {
        setPullRefreshIndicator("Refreshing...", "ready");
        setTimeout(() => window.location.replace(getReloadUrlWithCacheBust()), 120);
      } else {
        setPullRefreshIndicator("", "");
      }

      pullStartY = null;
      pullDistance = 0;
      pullRefreshTriggered = false;
      pullRefreshGestureCaptured = false;
    }

    async function loadStatuses() {
      if (isLoadingStatuses || anyCardExpanded()) { updateAutoRefreshState(); return; }
      isLoadingStatuses = true;
      stopCountdown();
      const container = document.getElementById("results"), firstLoad = !container.children.length;
      if (firstLoad) { container.innerHTML = "<div class='card'><div class='card-fit'>Loading...</div></div>"; setFooterText("Loading...", false); }
      else { setRefreshing(true); setFooterText("Refreshing..."); }
      const resultsData = await Promise.all(providers.map(fetchProvider));
      if (!firstLoad) await sleep(fadeDurationMs);
      updateSummary(resultsData);
      container.innerHTML = "";
      resultsData.forEach(service => {
        const card = document.createElement("div"), badgeClass = getStatusClass(service), displayStatus = getDisplayStatus(service), detailHtml = buildIncidentDetails(service);
        card.className = "card " + getCardBorderClass(service);
        card.innerHTML = `<div class="card-fit"><div class="service-header"><h2><a class="provider-link" href="${service.statusPage}" target="_blank" rel="noopener noreferrer">${escapeHtml(service.name)}</a></h2></div>${logoHtml(service)}<div class="badge ${badgeClass}">${displayStatus}</div><div class="card-detail"><strong>Active incidents:</strong> ${service.activeIncidents.length}</div>${maintenanceSummaryHtml(service)}<div class="card-detail provider-updated-line"><strong>Provider updated:</strong> ${formatUpdatedTime(service.updated)} (${timeAgo(service.updated)})</div><div class="mobile-details"><div class="mobile-details-inner">${detailHtml}</div></div><button class="mobile-card-toggle" type="button" aria-label="Expand ${escapeHtml(service.name)} details" aria-expanded="false" title="Expand details" onclick="toggleMobileCardDetails(this)"></button></div>`;
        card.addEventListener("dblclick", event => { if (event.target.closest("a, button")) return; event.preventDefault(); event.stopPropagation(); toggleCardExpanded(card); });
        container.appendChild(card);
      });
      document.getElementById("lastRefreshFooter").innerText = "Last refreshed: " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      document.getElementById("dashboardMeta").innerText = "Version: " + dashboardVersion + " | Built and maintained by " + dashboardMaintainer;
      isLoadingStatuses = false;
      fitDesktopCards();
      requestAnimationFrame(() => { setRefreshing(false); startCountdown(); });
    }

    applySavedTheme();
    updateCurrentTime();
    document.getElementById("summaryBanner").addEventListener("dblclick", event => { event.preventDefault(); triggerEasterEgg(); });
    document.getElementById("summaryBanner").addEventListener("touchend", handleBannerTap, { passive: true });
    document.querySelector(".header-brand-logo").addEventListener("click", handleLogoTap);
    document.querySelector(".header-brand-logo").addEventListener("touchend", handleLogoTap, { passive: false });
    document.addEventListener("touchstart", handlePullRefreshStart, { passive: true });
    document.addEventListener("touchmove", handlePullRefreshMove, { passive: false });
    document.addEventListener("touchend", handlePullRefreshEnd, { passive: true });
    document.addEventListener("touchcancel", resetPullRefreshState, { passive: true });
    loadStatuses();
    startAutoRefresh();
    window.addEventListener("resize", scheduleDesktopCardFit);
    window.addEventListener("orientationchange", refitViewportAfterOrientationChange);
    setInterval(updateCurrentTime, 1000);
  </script>
